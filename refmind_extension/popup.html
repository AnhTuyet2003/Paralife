<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refmind Web Clipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Loading State -->
  <div id="loading-state" class="loading-state">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <!-- Login Screen -->
  <div id="login-screen" class="screen" style="display: none;">
    <div class="header">
      <img src="icons/icon48.png" alt="Refmind" class="logo" onerror="this.style.display='none'">
      <h2>Refmind Web Clipper</h2>
      <p class="subtitle">Login to save documents</p>
    </div>

    <div class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <div class="form-group">
        <label for="backend-url">Backend URL</label>
        <input type="text" id="backend-url" value="http://localhost:3000" placeholder="http://localhost:3000">
        <small>Default: http://localhost:3000</small>
      </div>

      <button id="login-btn" class="btn btn-primary">Login</button>
      
      <div id="login-error" class="error-message" style="display: none;"></div>
    </div>
  </div>

  <!-- Main Screen (After Login) -->
  <div id="main-screen" class="screen" style="display: none;">
    <div class="header">
      <div class="header-top">
        <div class="user-info">
          <span class="user-email" id="user-email"></span>
        </div>
        <button id="logout-btn" class="btn-icon" title="Logout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- Page Info -->
    <div class="page-info">
      <div class="info-item">
        <label>Title:</label>
        <p id="page-title" class="page-title"></p>
      </div>

      <div class="info-item" id="authors-section" style="display: none;">
        <label>Authors:</label>
        <p id="page-authors" class="page-meta"></p>
      </div>

      <div class="info-item" id="doi-section" style="display: none;">
        <label>DOI:</label>
        <p id="page-doi" class="page-meta"></p>
      </div>

      <div class="info-item" id="pdf-section" style="display: none;">
        <label>PDF:</label>
        <p id="page-pdf" class="page-meta">
          <span class="badge badge-success">Available</span>
        </p>
      </div>

      <div class="info-item">
        <label>URL:</label>
        <p id="page-url" class="page-url"></p>
      </div>
    </div>

    <!-- User Input -->
    <div class="user-input">
      <div class="form-group">
        <label for="tags">Tags (comma separated)</label>
        <input type="text" id="tags" placeholder="machine-learning, research, important">
      </div>

      <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" rows="3" placeholder="Add your notes here..."></textarea>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="save-btn" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
        Save to Refmind
      </button>
    </div>

    <!-- Status Messages -->
    <div id="success-message" class="success-message" style="display: none;"></div>
    <div id="error-message" class="error-message" style="display: none;"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
